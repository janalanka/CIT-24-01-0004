<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
        h1 { margin-bottom: 0; }
        .meta { color: #666; font-size: 13px; margin-bottom: 20px; }
        form.add-form { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type=text] { flex: 1; padding: 8px; font-size: 14px; }
        button { padding: 8px 14px; font-size: 14px; cursor: pointer; }
        .add-btn { background: #2563eb; color: white; border: none; border-radius: 4px; }
        .delete-btn { background: #dc2626; color: white; border: none; border-radius: 4px; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center;
             border-bottom: 1px solid #eee; padding: 10px 0; }
        .note-text { font-weight: bold; }
        .note-time { color: #999; font-size: 12px; margin-left: 8px; }
    </style>
</head>
<body>
    <h1>Notes App</h1>
    <div class="meta">Web container talking to Postgres at host: {{ db_host }}</div>

    <form class="add-form" action="{{ url_for('add_note') }}" method="post">
        <input type="text" name="content" placeholder="Write a note..." required>
        <button class="add-btn" type="submit">Add</button>
    </form>

    <ul>
        {% for id, content, created_at in notes %}
        <li>
            <span>
                <span class="note-text">{{ content }}</span>
                <span class="note-time">({{ created_at }})</span>
            </span>
            <form action="{{ url_for('delete_note', note_id=id) }}" method="post">
                <button class="delete-btn" type="submit">Delete</button>
            </form>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
