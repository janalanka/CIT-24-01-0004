services:
  notesapp-db:
    image: postgres:16-alpine
    container_name: notesapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notesapp
      POSTGRES_USER: notesapp
      POSTGRES_PASSWORD: notesapp
    ports:
      - "5432:5432"
    volumes:
      - notesapp_db_data:/var/lib/postgresql/data
    networks:
      - notesapp-net

  notesapp-web:
    build: ./web
    image: notesapp-web:latest
    container_name: notesapp-web
    restart: unless-stopped
    environment:
      DB_HOST: notesapp-db
      DB_PORT: 5432
      DB_NAME: notesapp
      DB_USER: notesapp
      DB_PASSWORD: notesapp
    ports:
      - "5000:5000"
    depends_on:
      - notesapp-db
    networks:
      - notesapp-net

networks:
  notesapp-net:

volumes:
  notesapp_db_data:
  